name: Benchmarks

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
  pull_request:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BROWSE_BENCHMARK_OUT_DIR: .benchmarks/ci
      BROWSE_BENCHMARK_ITERATIONS: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install

      - name: Install browser binaries
        run: bun x patchright install chrome --with-deps

      - name: Run regression benchmark suite
        continue-on-error: true
        run: bun run bench:regression

      - name: Run workload benchmark suite
        continue-on-error: true
        run: bun run bench:workloads

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks/ci
          if-no-files-found: warn
