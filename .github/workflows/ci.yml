name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: macos-15-intel
            label: macos-intel
          - os: macos-14
            label: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers (Linux ARM64)
        if: matrix.label == 'linux-arm64'
        run: bun x playwright install firefox --with-deps

      - name: Install Playwright browsers (Linux)
        if: runner.os == 'Linux' && matrix.label != 'linux-arm64'
        run: bun x playwright install chrome --with-deps

      - name: Install Playwright browsers (macOS)
        if: runner.os != 'Linux'
        run: bun x playwright install chrome

      - name: Run tests
        run: bun test

      - name: Run fuzz tests
        run: bun run test:fuzz

      - name: Compile binary
        run: bun build --compile ./src/cli.ts --outfile dist/browse --external electron --external chromium-bidi

      - name: Smoke test binary
        run: |
          if [ "${{ matrix.label }}" = "linux-arm64" ]; then
            output=$(./dist/browse --browser firefox goto 'data:text/html,<title>CI</title><h1>CI</h1>' 2>&1 || true)
          else
            output=$(./dist/browse goto 'data:text/html,<title>CI</title><h1>CI</h1>' 2>&1 || true)
          fi
          echo "$output"
          echo "$output" | grep -q "CI" || { echo "Smoke test failed: expected 'CI' in output"; exit 1; }
