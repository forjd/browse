name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: browse-linux-x86_64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: browse-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: browse-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: browse-darwin-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Compile binary
        run: |
          bun build --compile --target=${{ matrix.target }} \
            ./src/cli.ts --outfile dist/${{ matrix.artifact }} \
            --external electron --external chromium-bidi

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            dist/${{ matrix.artifact }}
